apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: train-model
spec:
  entrypoint: training-and-build
  ttlStrategy:
    secondsAfterCompletion: 259200
  arguments:
    parameters:
    - name: branch
      value: main
    - name: training-repo-url
      value: https://github.com/rohitshididnyu/GemSpot_training.git
    - name: batch-repo-url
      value: https://github.com/lefteriskomvopoulos/gemspot.git
    - name: base-model-aliases
      value: production,staging-approved,staging

  # Schedule training/build workload on dedicated ML node(s)
  nodeSelector:
    workload: large
  tolerations:
  - key: dedicated
    operator: Equal
    value: large
    effect: NoSchedule

  # Compatibility: some clusters ignore seccompProfile/appArmorProfile fields
  podMetadata:
    annotations:
      seccomp.security.alpha.kubernetes.io/pod: unconfined
      container.apparmor.security.beta.kubernetes.io/main: unconfined

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

  volumes:
  - name: buildkitd
    emptyDir: {}
  - name: source-cache
    persistentVolumeClaim:
      claimName: argo-source-cache-pvc

  templates:
  - name: training-and-build
    steps:
      # Step 1: Clone repo and check if code has changed
      - - name: check-code-changes
          template: check-and-clone
          arguments:
            parameters:
            - name: branch
              value: "{{workflow.parameters.branch}}"
            - name: training-repo-url
              value: "{{workflow.parameters.training-repo-url}}"
            - name: batch-repo-url
              value: "{{workflow.parameters.batch-repo-url}}"
      # Step 2: Conditionally rebuild training image if code changed
      - - name: rebuild-training-image
          template: buildkit-rootless
          arguments:
            parameters:
            - name: git-commit
              value: "{{steps.check-code-changes.outputs.parameters.git-commit}}"
            - name: batch-commit
              value: "{{steps.check-code-changes.outputs.parameters.batch-commit}}"
          when: "'{{steps.check-code-changes.outputs.parameters.needs-rebuild}}' == 'true'"
      - - name: tag-training-image-immutable
          template: copy-latest-to-sha
          arguments:
            parameters:
            - name: git-commit
              value: "{{steps.check-code-changes.outputs.parameters.git-commit}}"
          when: "'{{steps.check-code-changes.outputs.parameters.needs-rebuild}}' == 'true'"
      # Step 3: Run training
      - - name: run-training
          template: run-training
          arguments:
            parameters:
            - name: base-model-aliases
              value: "{{workflow.parameters.base-model-aliases}}"
      # Step 4: Register newly trained model version (if retrain improved)
      - - name: register-model-version
          template: register-model-version
      # Step 5: Build/deploy/test only when a new model version was registered
      - - name: build-deploy-and-test
          template: trigger-build-container-image
          arguments:
            parameters:
            - name: model-version
              value: "{{steps.register-model-version.outputs.parameters.model-version}}"
          when: "'{{steps.register-model-version.outputs.parameters.should-trigger-downstream}}' == 'true'"

  # Template: Clone repo and check if rebuild is needed by comparing git commit to image label
  - name: check-and-clone
    inputs:
      parameters:
      - name: branch
      - name: training-repo-url
      - name: batch-repo-url
    outputs:
      parameters:
      - name: needs-rebuild
        valueFrom:
          path: needs-rebuild.txt
      - name: git-commit
        valueFrom:
          path: git-commit.txt
      - name: batch-commit
        valueFrom:
          path: batch-commit.txt
    retryStrategy:
      limit: "5"
      retryPolicy: "Always"
      backoff:
        duration: "10s"
        factor: "2"
    container:
      image: alpine/git:v2.26.2
      workingDir: /mnt/workspace
      command: [sh, -c]
      env:
      - name: GITHUB_USERNAME
        valueFrom:
          secretKeyRef:
            name: github-repo-auth
            key: username
            optional: true
      - name: GITHUB_TOKEN
        valueFrom:
          secretKeyRef:
            name: github-repo-auth
            key: token
            optional: true
      args:
        - |
          set -eu

          OUT_NEEDS="needs-rebuild.txt"
          OUT_GIT="git-commit.txt"
          OUT_BATCH="batch-commit.txt"

          # Ensure output parameter files always exist, even on early failure.
          ensure_outputs() {
            [ -f "$OUT_NEEDS" ] || echo "false" > "$OUT_NEEDS"
            [ -f "$OUT_GIT" ] || echo "unknown" > "$OUT_GIT"
            [ -f "$OUT_BATCH" ] || echo "unknown" > "$OUT_BATCH"
          }
          trap ensure_outputs EXIT
          ensure_outputs
          
          # Argo PVC mount may contain leftover files; ensure clean clone target.
          find /mnt/workspace -mindepth 1 -maxdepth 1 -exec rm -rf {} +

          HAVE_CACHE="false"
          if [ -f /source-cache/GemSpot_training/requirements.txt ] && [ -d /source-cache/gemspot/batch_pipeline ]; then
            HAVE_CACHE="true"
          fi

          if [ "$HAVE_CACHE" = "true" ]; then
            echo "Using cached repositories from /source-cache"
            cp -R /source-cache/GemSpot_training/. /mnt/workspace/
            rm -rf /tmp/gemspot-batch
            mkdir -p /tmp/gemspot-batch
            cp -R /source-cache/gemspot/. /tmp/gemspot-batch/
          fi

          TRAINING_URL="{{inputs.parameters.training-repo-url}}"
          BATCH_URL="{{inputs.parameters.batch-repo-url}}"
          if [ -n "${GITHUB_USERNAME:-}" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
            TRAINING_URL=$(echo "$TRAINING_URL" | sed "s#https://github.com/#https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/#")
            BATCH_URL=$(echo "$BATCH_URL" | sed "s#https://github.com/#https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/#")
          fi

          if [ "$HAVE_CACHE" != "true" ]; then
            # Clone the repositories only when cache is not available.
            if ! git clone --depth 1 --filter=blob:none --no-tags --single-branch \
              --branch "{{inputs.parameters.branch}}" \
              "$TRAINING_URL" .; then
              echo "WARN: could not clone training repo (network/DNS issue)."
              echo "WARN: fallback to existing proj10-training:latest (skip rebuild)."
              echo "false" > "$OUT_NEEDS"
              exit 0
            fi

            rm -rf /tmp/gemspot-batch
            if ! git clone --depth 1 --filter=blob:none --no-tags --single-branch \
              "$BATCH_URL" /tmp/gemspot-batch; then
              echo "WARN: could not clone batch repo (network/DNS issue)."
              echo "WARN: fallback to existing proj10-training:latest (skip rebuild)."
              echo "false" > "$OUT_NEEDS"
              exit 0
            fi

            # Refresh cache after successful clone (best effort).
            mkdir -p /source-cache/GemSpot_training /source-cache/gemspot
            rm -rf /source-cache/GemSpot_training/* /source-cache/gemspot/*
            cp -R /mnt/workspace/. /source-cache/GemSpot_training/ || true
            cp -R /tmp/gemspot-batch/. /source-cache/gemspot/ || true
          fi

          mkdir -p /mnt/workspace/gemspot
          cp -R /tmp/gemspot-batch/batch_pipeline /mnt/workspace/gemspot/

          # Build recipe for Option B (combined image: training + batch + deps).
          cat > /mnt/workspace/Dockerfile.combined <<'EOF'
          FROM python:3.11-slim
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
          ENV PYTHONPATH=/app/src
          WORKDIR /app

          COPY requirements.txt /app/requirements.txt
          COPY gemspot/batch_pipeline/requirements.txt /app/batch-requirements.txt
          RUN pip install --no-cache-dir --upgrade pip && \
              pip install --no-cache-dir -r /app/requirements.txt && \
              pip install --no-cache-dir -r /app/batch-requirements.txt

          COPY . /app
          COPY gemspot/batch_pipeline /gemspot/batch_pipeline

          CMD ["python", "src/retrain.py"]
          EOF
          
          # Get current git commit (short SHA used as immutable image tag)
          if git rev-parse --short=12 HEAD >/dev/null 2>&1; then
            GIT_COMMIT=$(git rev-parse --short=12 HEAD)
          else
            GIT_COMMIT="cached-$(date +%Y%m%d%H%M%S)"
          fi
          if git -C /tmp/gemspot-batch rev-parse --short=12 HEAD >/dev/null 2>&1; then
            BATCH_COMMIT=$(git -C /tmp/gemspot-batch rev-parse --short=12 HEAD)
          else
            BATCH_COMMIT="cached-$(date +%Y%m%d%H%M%S)"
          fi
          echo "Current git commit: $GIT_COMMIT"
          echo "Current batch git commit: $BATCH_COMMIT"
          
          # Update output parameters with resolved commit SHAs
          echo "$GIT_COMMIT" > "$OUT_GIT"
          echo "$BATCH_COMMIT" > "$OUT_BATCH"
          
          # Deterministic policy: always rebuild training image from freshly-cloned repos.
          # This avoids fragile runtime dependency on registry metadata queries.
          echo "Rebuild needed: deterministic rebuild policy enabled"
          echo "true" > "$OUT_NEEDS"
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace
      - name: source-cache
        mountPath: /source-cache

  # Template: Build training container image using buildkit
  - name: buildkit-rootless
    inputs:
      parameters:
      - name: git-commit
      - name: batch-commit
    retryStrategy:
      limit: "3"
      retryPolicy: "Always"
      backoff:
        duration: "30s"
        factor: "2"
    container:
      image: moby/buildkit:rootless
      env:
      - name: BUILDKITD_FLAGS
        value: --oci-worker-no-process-sandbox
      command: [buildctl-daemonless.sh]
      args:
        - build
        - --frontend
        - dockerfile.v0
        - --local
        - context=/mnt/workspace
        - --local
        - dockerfile=/mnt/workspace
        - --opt
        - label:git.commit={{inputs.parameters.git-commit}}
        - --opt
        - label:batch.commit={{inputs.parameters.batch-commit}}
        - --opt
        - label:build.flavor=combined-v2
        - --opt
        - filename=Dockerfile.combined
        - --output
        - type=image,name=registry.kube-system.svc.cluster.local:5000/proj10-training:latest,push=true,registry.insecure=true
        - --export-cache
        - type=registry,ref=registry.kube-system.svc.cluster.local:5000/proj10-training:buildcache,mode=max,registry.insecure=true
        - --import-cache
        - type=registry,ref=registry.kube-system.svc.cluster.local:5000/proj10-training:buildcache,registry.insecure=true
      resources:
        requests:
          memory: "2Gi"
          cpu: "500m"
        limits:
          memory: "3Gi"
          cpu: "1"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace
      - name: buildkitd
        mountPath: /home/user/.local/share/buildkit

  - name: copy-latest-to-sha
    inputs:
      parameters:
      - name: git-commit
    container:
      image: gcr.io/go-containerregistry/crane:debug
      command: [crane]
      args:
        - copy
        - --insecure
        - registry.kube-system.svc.cluster.local:5000/proj10-training:latest
        - registry.kube-system.svc.cluster.local:5000/proj10-training:{{inputs.parameters.git-commit}}

  - name: run-training
    inputs:
      parameters:
      - name: base-model-aliases
    container:
      image: registry.kube-system.svc.cluster.local:5000/proj10-training:latest
      command: [sh, -c]
      args:
        - |
          set -eu

          BASE_MODEL_PATH="$(python - <<'PY'
          import os
          import sys
          import joblib
          import mlflow
          import mlflow.sklearn
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ["MLFLOW_TRACKING_URI"]
          model_name = os.environ.get("MODEL_NAME", "proj10AdventureLogModel")
          aliases_raw = os.environ.get("BASE_MODEL_ALIASES", "production,staging-approved,staging")
          aliases = [a.strip() for a in aliases_raw.split(",") if a.strip()]
          fallback_path = os.environ.get("OLD_MODEL_FALLBACK", "artifacts/models/xgboost_v2.joblib")

          client = MlflowClient(tracking_uri=tracking_uri)

          for alias in aliases:
            try:
              mv = client.get_model_version_by_alias(model_name, alias)
              model_uri = f"models:/{model_name}/{mv.version}"
              model = mlflow.sklearn.load_model(model_uri)
              out_path = "/tmp/base_model.joblib"
              joblib.dump(model, out_path)
              print(f"Resolved base model from MLflow alias '{alias}' -> version {mv.version}", file=sys.stderr)
              print(out_path)
              raise SystemExit(0)
            except Exception as exc:
              print(f"Alias '{alias}' not usable: {exc}", file=sys.stderr)

          if os.path.exists(fallback_path):
            print(f"Using fallback base model path: {fallback_path}", file=sys.stderr)
            print(fallback_path)
            raise SystemExit(0)

          raise SystemExit(
            "No base model found from aliases and fallback missing. "
            f"Aliases tried: {aliases}; fallback: {fallback_path}"
          )
          PY
          )"
          echo "Base model path for retrain: ${BASE_MODEL_PATH}"

          python src/retrain.py \
            --config "configs/candidates.yaml" \
            --candidate "xgboost_v2" \
            --parquet-path "s3://agent-datalake/iceberg/adventurelog.db/training_data/data/" \
            --old-model "${BASE_MODEL_PATH}" \
            --artifact-dir "artifacts/models" \
            --backup-dir "artifacts/models/_backup" \
            --improvement-threshold 0.001 \
            --primary-metric "roc_auc" \
            --additional-rounds 300 \
            --tracking-uri "${MLFLOW_TRACKING_URI}" \
            --experiment-name "GemSpot-Retrain"
      env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow.proj10-platform.svc.cluster.local:8000"
        - name: AWS_ENDPOINT_URL
          value: "http://minio.proj10-platform.svc.cluster.local:9000"
        - name: AWS_REGION
          value: "us-east-1"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: accesskey
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: secretkey
        - name: MODEL_NAME
          value: "proj10AdventureLogModel"
        - name: BASE_MODEL_ALIASES
          value: "{{inputs.parameters.base-model-aliases}}"
        - name: OLD_MODEL_FALLBACK
          value: "artifacts/models/xgboost_v2.joblib"
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace

  - name: register-model-version
    outputs:
      parameters:
      - name: model-version
        valueFrom:
          path: /tmp/model-version.txt
      - name: should-trigger-downstream
        valueFrom:
          path: /tmp/should-trigger-downstream.txt
    script:
      image: python:3.11-slim
      command: [sh, -c]
      source: |
        set -eu
        pip install --no-cache-dir mlflow-skinny==3.9.0 > /dev/null
        export MLFLOW_TRACKING_URI=http://mlflow.proj10-platform.svc.cluster.local:8000

        python - <<'PY'
        from pathlib import Path
        import mlflow
        from mlflow.tracking import MlflowClient

        out = Path("/tmp/model-version.txt")
        gate = Path("/tmp/should-trigger-downstream.txt")
        out.write_text("", encoding="utf-8")
        gate.write_text("false", encoding="utf-8")

        client = MlflowClient()
        exp = client.get_experiment_by_name("GemSpot-Retrain")
        if exp is None:
            print("GemSpot-Retrain experiment not found; skipping downstream flow.")
            raise SystemExit(0)

        runs = client.search_runs(
            experiment_ids=[exp.experiment_id],
            order_by=["start_time DESC"],
            max_results=1,
        )
        if not runs:
            print("No retrain runs found; skipping downstream flow.")
            raise SystemExit(0)

        run = runs[0]
        improved = float(run.data.metrics.get("decision.improved", 0.0) or 0.0)
        if improved < 0.5:
            print("Latest retrain run did not improve; no model registration.")
            raise SystemExit(0)

        mv = mlflow.register_model(
            model_uri=f"runs:/{run.info.run_id}/model",
            name="proj10AdventureLogModel",
        )
        version = str(mv.version)
        print(f"Registered new model version: {version}")
        out.write_text(version, encoding="utf-8")
        gate.write_text("true", encoding="utf-8")
        PY

  - name: trigger-build-container-image
    inputs:
      parameters:
      - name: model-version
    resource:
      action: create
      manifest: |
        apiVersion: argoproj.io/v1alpha1
        kind: Workflow
        metadata:
          generateName: build-container-image-
          namespace: argo
        spec:
          workflowTemplateRef:
            name: build-container-image
          arguments:
            parameters:
            - name: model-version
              value: "{{inputs.parameters.model-version}}"
