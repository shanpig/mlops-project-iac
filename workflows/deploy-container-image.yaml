apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: deploy-container-image
spec:
  entrypoint: deploy
  arguments:
    parameters:
    - name: environment
    - name: model-version

  templates:
  - name: deploy
    inputs:
      parameters:
      - name: environment
      - name: model-version
    container:
      image: argoproj/argocd:latest
      command: [sh, -c]
      args:
        - |
          echo "Deploying model {{inputs.parameters.model-version}} to {{inputs.parameters.environment}}..."
          tag="{{inputs.parameters.environment}}-1.0.{{inputs.parameters.model-version}}"
          app_name="proj10-pipeline"

          argocd login argocd-server.argocd.svc.cluster.local \
            --username admin \
            --password "$ARGOCD_PASSWORD" \
            --insecure

          argocd app set "$app_name" \
            --helm-set-string mlServing.image.tag=$tag \
            --helm-set-string mlServing.env.MODEL_PATH=/models/gemspot_xgb.joblib \
            --helm-set-string mlServing.env.MLFLOW_URL=http://mlflow.proj10-platform.svc.cluster.local:8000 \
            --helm-set-string mlServing.env.MLFLOW_MODEL_NAME=proj10AdventureLogModel \
            --helm-set-string mlServing.env.MLFLOW_MODEL_ALIAS={{inputs.parameters.environment}}
          argocd app sync "$app_name"
      env:
        - name: ARGOCD_PASSWORD
          valueFrom:
            secretKeyRef:
              name: argocd-initial-admin-secret
              key: password
