apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  generateName: build-initial-container-image-
spec:
  entrypoint: buildkit-rootless-build-flow

  # Compatibility: some clusters ignore seccompProfile/appArmorProfile fields
  # (or enforce defaults) unless annotations are also set.
  podMetadata:
    annotations:
      seccomp.security.alpha.kubernetes.io/pod: unconfined
      container.apparmor.security.beta.kubernetes.io/main: unconfined

  volumeClaimTemplates:
  - metadata:
      name: workdir
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi

  volumes:
  - name: buildkitd
    emptyDir: {}

  templates:
  - name: buildkit-rootless-build-flow
    steps:
      # Step 1: Clone the AdventureLog app repository fork
      - - name: clone-repo
          template: git-clone
      # Step 2: Resolve a unique app version from timestamp + commit SHA
      - - name: resolve-version
          template: resolve-version
      # Step 3: Build frontend and backend images in parallel and push with staging version tag
      - - name: buildkit-build-frontend
          template: buildkit-rootless
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: build-context
              value: /mnt/workspace/frontend
            - name: dockerfile-path
              value: /mnt/workspace/frontend
            - name: image-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: cache-ref
              value: proj10-adventurelog-frontend:buildcache
        - name: buildkit-build-backend
          template: buildkit-rootless
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: build-context
              value: /mnt/workspace/backend
            - name: dockerfile-path
              value: /mnt/workspace/backend
            - name: image-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: cache-ref
              value: proj10-adventurelog-backend:buildcache
      # Step 4: Copy staging version tags to canary/production version tags (no rebuild)
      - - name: tag-frontend-canary
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: canary-{{steps.resolve-version.outputs.parameters.app-version}}
        - name: tag-frontend-production
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: production-{{steps.resolve-version.outputs.parameters.app-version}}
        - name: tag-backend-canary
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: canary-{{steps.resolve-version.outputs.parameters.app-version}}
        - name: tag-backend-production
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: production-{{steps.resolve-version.outputs.parameters.app-version}}
      # Step 5: Update stable aliases used by default environment values
      - - name: tag-frontend-staging-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: staging-latest
        - name: tag-frontend-canary-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: src-tag
              value: canary-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: canary-latest
        - name: tag-frontend-production-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-frontend
            - name: src-tag
              value: production-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: production-latest
        - name: tag-backend-staging-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: src-tag
              value: staging-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: staging-latest
        - name: tag-backend-canary-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: src-tag
              value: canary-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: canary-latest
        - name: tag-backend-production-latest
          template: copy-tag
          arguments:
            parameters:
            - name: image-name
              value: proj10-adventurelog-backend
            - name: src-tag
              value: production-{{steps.resolve-version.outputs.parameters.app-version}}
            - name: dst-tag
              value: production-latest

  # Template: Shallow clone of the app repository for faster checkout.
  # Uses default branch so branch name changes do not break the workflow.
  - name: git-clone
    retryStrategy:
      limit: "5"
      retryPolicy: "Always"
      backoff:
        duration: "10s"
        factor: "2"
    container:
      image: alpine/git:v2.26.2
      workingDir: /mnt/workspace
      command: [git]
      args:
        - clone
        - --depth
        - "1"
        - https://github.com/shanpig/mlops-project-app.git
        - .
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace

  - name: resolve-version
    script:
      image: alpine/git:v2.26.2
      workingDir: /mnt/workspace
      command: [sh]
      source: |
        set -eu
        APP_SHA="$(git rev-parse --short HEAD)"
        TS="$(date +%Y%m%d%H%M%S)"
        echo "${TS}-${APP_SHA}" > /tmp/app-version.txt
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace
    outputs:
      parameters:
      - name: app-version
        valueFrom:
          path: /tmp/app-version.txt

  # Template: Build image using buildkit (rootless, no docker daemon required)
  - name: buildkit-rootless
    retryStrategy:
      limit: "3"
      retryPolicy: "Always"
      backoff:
        duration: "30s"
        factor: "2"
    inputs:
      parameters:
      - name: image-name
      - name: build-context
      - name: dockerfile-path
      - name: image-tag
      - name: cache-ref
    container:
      image: moby/buildkit:rootless
      env:
      - name: BUILDKITD_FLAGS
        value: --oci-worker-no-process-sandbox
      command: [buildctl-daemonless.sh]
      args:
        - build
        - --frontend
        - dockerfile.v0
        - --local
        - context={{inputs.parameters.build-context}}
        - --local
        - dockerfile={{inputs.parameters.dockerfile-path}}
        - --output
        - type=image,name=registry.kube-system.svc.cluster.local:5000/{{inputs.parameters.image-name}}:{{inputs.parameters.image-tag}},push=true,registry.insecure=true
        - --export-cache
        - type=registry,ref=registry.kube-system.svc.cluster.local:5000/{{inputs.parameters.cache-ref}},mode=max,registry.insecure=true
        - --import-cache
        - type=registry,ref=registry.kube-system.svc.cluster.local:5000/{{inputs.parameters.cache-ref}},registry.insecure=true
      resources:
        requests:
          memory: "2Gi"
          cpu: "500m"
        limits:
          memory: "3Gi"
          cpu: "1"
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: Unconfined
        appArmorProfile:
          type: Unconfined
      volumeMounts:
      - name: workdir
        mountPath: /mnt/workspace
      - name: buildkitd
        mountPath: /home/user/.local/share/buildkit

  # Template: Copy image to a new tag without rebuilding (uses crane)
  - name: copy-tag
    inputs:
      parameters:
      - name: image-name
      - name: src-tag
      - name: dst-tag
    container:
      image: gcr.io/go-containerregistry/crane:debug
      command: [crane]
      args:
        - copy
        - --insecure
        - registry.kube-system.svc.cluster.local:5000/{{inputs.parameters.image-name}}:{{inputs.parameters.src-tag}}
        - registry.kube-system.svc.cluster.local:5000/{{inputs.parameters.image-name}}:{{inputs.parameters.dst-tag}}
