frontend:
  replicaCount: 1
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-adventurelog-frontend
    tag: production-1.0.0
  service:
    port: 8080
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

backend:
  replicaCount: 1
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-adventurelog-backend
    tag: production-1.0.0
  service:
    port: 8000
    nginxPort: 80
  resources:
    limits:
      cpu: "500m"
      memory: "768Mi"
    requests:
      cpu: "250m"
      memory: "384Mi"

postgres:
  image:
    repository: postgis/postgis
    tag: "15-3.3"
  dbName: database
  user: adventure
  service:
    port: 5432
  storage:
    size: 10Gi

persistence:
  media:
    size: 10Gi

service:
  # Injected by ArgoCD app set in ansible/argocd/argocd_add_*.yml
  externalIP: ""

app:
  publicUrl: "http://localhost:8080"
  frontendUrl: "http://localhost:8080"
  csrfTrustedOrigins: "http://localhost:8080"
  frontendBodySizeLimit: "Infinity"
  debug: "false"

secrets:
  existingSecret: "proj10-adventurelog-secrets"
