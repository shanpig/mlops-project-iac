# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj10-app
  namespace: proj10-production
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: proj10-app
  template:
    metadata:
      labels:
        app: proj10-app
    spec:
      containers:
        - name: proj10-app
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: proj10-app
  namespace: proj10-production
spec:
  selector:
    app: proj10-app
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
  externalIPs:
    - {{ .Values.service.externalIP }}
---
# ReferenceGrant allows HTTPRoute in proj10-platform to reference this Service
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-platform-httproute
  namespace: proj10-production
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: proj10-platform
  to:
  - group: ""
    kind: Service
