apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proj10-media-pvc
  namespace: proj10-canary
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistence.media.size }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proj10-postgres-pvc
  namespace: proj10-canary
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: proj10-postgres
  namespace: proj10-canary
spec:
  serviceName: proj10-postgres
  replicas: 1
  selector:
    matchLabels:
      app: proj10-postgres
  template:
    metadata:
      labels:
        app: proj10-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: proj10-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: proj10-postgres
  namespace: proj10-canary
spec:
  selector:
    app: proj10-postgres
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj10-backend
  namespace: proj10-canary
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: proj10-backend
  template:
    metadata:
      labels:
        app: proj10-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGHOST
              value: proj10-postgres
            - name: PGDATABASE
              value: {{ .Values.postgres.dbName | quote }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: POSTGRES_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: SECRET_KEY
            - name: DJANGO_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: DJANGO_ADMIN_USERNAME
            - name: DJANGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: DJANGO_ADMIN_PASSWORD
            - name: DJANGO_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: DJANGO_ADMIN_EMAIL
            - name: PUBLIC_URL
              value: {{ .Values.app.publicUrl | quote }}
            - name: FRONTEND_URL
              value: {{ .Values.app.frontendUrl | quote }}
            - name: CSRF_TRUSTED_ORIGINS
              value: {{ .Values.app.csrfTrustedOrigins | quote }}
            - name: DEBUG
              value: {{ .Values.app.debug | quote }}
            - name: ML_SERVING_URL
              value: {{ .Values.app.mlServingUrl | quote }}
            - name: ML_API_URL
              value: {{ .Values.app.mlApiUrl | quote }}
          ports:
            - containerPort: {{ .Values.backend.service.nginxPort }}
            - containerPort: {{ .Values.backend.service.port }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: media-storage
              mountPath: /code/media
      volumes:
        - name: media-storage
          persistentVolumeClaim:
            claimName: proj10-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: proj10-backend
  namespace: proj10-canary
spec:
  selector:
    app: proj10-backend
  ports:
    - name: http
      port: {{ .Values.backend.service.nginxPort }}
      targetPort: {{ .Values.backend.service.nginxPort }}
    - name: api
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proj10-frontend
  namespace: proj10-canary
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: proj10-frontend
  template:
    metadata:
      labels:
        app: proj10-frontend
    spec:
      containers:
        - name: frontend
          image: {{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PUBLIC_SERVER_URL
              value: http://proj10-backend:{{ .Values.backend.service.nginxPort }}
            - name: ORIGIN
              value: {{ .Values.app.frontendUrl | quote }}
            - name: BODY_SIZE_LIMIT
              value: {{ .Values.app.frontendBodySizeLimit | quote }}
          ports:
            - containerPort: 3000
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: proj10-frontend
  namespace: proj10-canary
spec:
  selector:
    app: proj10-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 3000
  {{- if .Values.service.externalIP }}
  externalIPs:
    - {{ .Values.service.externalIP }}
  {{- end }}
---
# ReferenceGrant allows HTTPRoute in proj10-platform to reference Services in this namespace
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-platform-httproute
  namespace: proj10-canary
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: proj10-platform
  to:
  - group: ""
    kind: Service
