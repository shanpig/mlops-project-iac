namespace: proj10-platform

# Phase 1 scaffold values. Runtime services are added in later phases.
pipeline:
  phase: "phase-5-admin-ux-tools"

redpanda:
  enabled: true
  name: redpanda
  externalIP: ""
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: v25.3.7
  service:
    kafkaPort: 9092
    schemaRegistryPort: 8090
    pandaProxyPort: 18082
    adminPort: 9644
    rpcPort: 33145
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  logRetentionMs: "2592000000"
  logSegmentMs: "3600000"

redpandaConsole:
  enabled: true
  name: redpanda-console
  externalIP: ""
  image:
    repository: docker.redpanda.com/redpandadata/console
    tag: latest
  service:
    # Keep external service port separate from app frontend ports.
    port: 8083
    targetPort: 8080
  env:
    KAFKA_BROKERS: "redpanda:9092"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  enabled: true
  name: redis
  image:
    repository: redis
    tag: "7-alpine"
  service:
    port: 6379
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

streamConsumer:
  enabled: true
  name: stream-consumer
  replicaCount: 1
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-gemspot-ml-consumer
    tag: latest
    pullPolicy: Always
  postgresSecret:
    name: postgres-credentials
    keys:
      host: host
      username: username
      password: password
      dbname: dbname
  minioSecret:
    name: minio-credentials
    keys:
      accessKey: accesskey
      secretKey: secretkey
  env:
    KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
    KAFKA_CONSUMER_GROUP: "adventurelog-consumer"
    KAFKA_TOPICS: "adventurelog.clicks,adventurelog.comments,adventurelog.rates"
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    REDIS_DB: "0"
    ENDPOINT_URL: "http://minio.proj10-platform.svc.cluster.local:9000"
    LOG_LEVEL: "INFO"
    PROMETHEUS_METRICS_PORT: "9100"
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
    SENTENCE_TRANSFORMERS_HOME: "/app/.cache/sentence_transformers"
  metrics:
    enabled: true
    serviceName: stream-consumer-metrics
    port: 9100
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

streamConsumerWatchdog:
  enabled: true
  name: stream-consumer-watchdog
  image:
    repository: alpine
    tag: "3.19"
  schedule: "*/2 * * * *"
  suspend: false
  targetNamespace: proj10-platform
  targetDeployment: stream-consumer
  lookbackWindow: "5m"
  logTailLines: 500
  errorPattern: "connection already closed"
  restartThreshold: 20
  ttlSecondsAfterFinished: 7200
  # Keep watchdog schedulable on any healthy node (it does not need large workers).
  nodeSelector: {}
  tolerations: []
  resources:
    requests:
      cpu: "20m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"

monitoring:
  enabled: true

  alertmanager:
    name: alertmanager
    image:
      repository: prom/alertmanager
      tag: latest
    service:
      port: 9093
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  pushgateway:
    name: pushgateway
    image:
      repository: prom/pushgateway
      tag: latest
    service:
      port: 9091
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  prometheus:
    name: prometheus
    externalIP: ""
    image:
      repository: prom/prometheus
      tag: latest
    service:
      port: 9090
    storage:
      size: 10Gi
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

  grafana:
    name: grafana
    externalIP: ""
    image:
      repository: grafana/grafana
      tag: latest
    service:
      port: 3000
    adminUser: admin
    adminPassword: admin
    storage:
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

modelServer:
  enabled: false
  name: model-server
  replicaCount: 1
  image:
    repository: hashicorp/http-echo
    tag: "1.0.0"
  service:
    port: 8000
  responseText: "dummy-risk-model:ok:v0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

mlServing:
  enabled: true
  name: ml-serving
  replicaCount: 1
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-gemspot-ml-serving
    tag: latest
  service:
    port: 8000
  env:
    MODEL_PATH: /models/gemspot_xgb.joblib
    REDIS_URL: redis://redis:6379/0
    MLFLOW_URL: http://mlflow.proj10-platform.svc.cluster.local:8000
    MLFLOW_MODEL_NAME: proj10AdventureLogModel
    MLFLOW_MODEL_ALIAS: staging
    LOG_LEVEL: INFO
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

mlApi:
  enabled: true
  name: ml-api
  replicaCount: 1
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-gemspot-ml-api
    tag: latest
  service:
    port: 8000
  postgresSecret:
    name: postgres-credentials
    keys:
      host: host
      username: username
      password: password
      dbname: dbname
  env:
    KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
    KAFKA_TOPIC_CLICKS: "adventurelog.clicks"
    KAFKA_TOPIC_COMMENTS: "adventurelog.comments"
    KAFKA_TOPIC_RATES: "adventurelog.rates"
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

autoscaling:
  enabled: true
  mlApi:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  mlServing:
    enabled: true
    minReplicas: 1
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

etlJob:
  enabled: true
  name: etl-job
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-gemspot-etl-job
    tag: latest
  schedule: "0 3 * * *"
  suspend: true
  postgresSecret:
    name: postgres-credentials
    keys:
      host: host
      username: username
      password: password
      dbname: dbname
  minioSecret:
    name: minio-credentials
    keys:
      accessKey: accesskey
      secretKey: secretkey
  env:
    ENDPOINT_URL: "http://minio.proj10-platform.svc.cluster.local:9000"
    ETL_NROWS: "1000"
  markovModel:
    bucket: "agent-datalake"
    key: "vibe_models/vibe_markov_models.json"
    region: "us-east-1"
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

dataGenerator:
  enabled: true
  name: data-generator
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-gemspot-data-generator
    tag: latest
  schedule: "*/60 * * * *"
  suspend: false
  runSeconds: "300"
  postgresSecret:
    name: postgres-credentials
    keys:
      host: host
      username: username
      password: password
      dbname: dbname
  minioSecret:
    name: minio-credentials
    keys:
      accessKey: accesskey
      secretKey: secretkey
  env:
    GENERATOR_API_URL: "http://ml-api.proj10-platform.svc.cluster.local:8000"
    API_BASE_URL: "http://ml-api.proj10-platform.svc.cluster.local:8000"
    BACKEND_URL: "http://proj10-backend.proj10-production.svc.cluster.local:80"
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    GENERATOR_JOURNEYS_PER_SEC: "2.0"
    GEMSPOT_RPS: "0.2"
    GEMSPOT_API_KEY: ""
    PAUSED: "false"
  markovModel:
    enabled: true
    endpointUrl: "http://minio.proj10-platform.svc.cluster.local:9000"
    bucket: "agent-datalake"
    key: "vibe_models/vibe_markov_models.json"
    region: "us-east-1"
  gemspotApiKeySecret:
    enabled: true
    name: "gemspot-api"
    key: "GEMSPOT_API_KEY"
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

batchPipeline:
  enabled: true
  name: batch-pipeline
  image:
    repository: registry.kube-system.svc.cluster.local:5000/proj10-training
    tag: latest
  # Keep suspended by default; trigger manually with:
  # kubectl -n proj10-platform create job --from=cronjob/batch-pipeline batch-pipeline-manual-$(date +%s)
  schedule: "0 0 * * *"
  suspend: false
  postgresSecret:
    name: postgres-credentials
    keys:
      host: host
      username: username
      password: password
      dbname: dbname
  minioSecret:
    name: minio-credentials
    keys:
      accessKey: accesskey
      secretKey: secretkey
  env:
    ENDPOINT_URL: "http://minio.proj10-platform.svc.cluster.local:9000"
    PUSHGATEWAY_URL: "http://pushgateway.proj10-platform.svc.cluster.local:9091"
  nodeSelector:
    workload: large
  tolerations:
    - key: dedicated
      operator: Equal
      value: large
      effect: NoSchedule
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

airflow:
  enabled: true
  name: airflow
  image:
    repository: apache/airflow
    tag: "2.9.3-python3.11"
  service:
    port: 8080
  storage:
    size: 20Gi
  existingSecret: airflow-secrets
  secretKeys:
    username: AIRFLOW_ADMIN_USERNAME
    password: AIRFLOW_ADMIN_PASSWORD
    firstname: AIRFLOW_ADMIN_FIRSTNAME
    lastname: AIRFLOW_ADMIN_LASTNAME
    email: AIRFLOW_ADMIN_EMAIL
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "3Gi"

adminer:
  enabled: true
  name: adminer
  image:
    repository: adminer
    tag: "latest"
  service:
    port: 5050
  externalIP: ""
  defaultServer: proj10-postgres.proj10-production.svc.cluster.local
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

redisInsight:
  enabled: true
  name: redisinsight
  image:
    repository: redis/redisinsight
    tag: "latest"
  service:
    port: 15540
  externalIP: ""
  storage:
    size: 5Gi
  env:
    redisHost: redis
    redisPort: "6379"
    redisAlias: proj10-redis
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

nimtable:
  enabled: true
  name: nimtable
  image:
    repository: ghcr.io/nimtable/nimtable
    tag: "nightly"
  service:
    port: 18182
    targetPort: 8182
  externalIP: ""
  javaOpts: "-Xmx2g -Xms256m"
  config:
    existingSecret: nimtable-config
    key: config.yaml
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

nimtableWeb:
  enabled: true
  name: nimtable-web
  image:
    repository: ghcr.io/nimtable/nimtable-web
    tag: "nightly"
  service:
    port: 13000
    targetPort: 3000
  externalIP: ""
  existingSecret: nimtable-secrets
  secretKeys:
    databaseUrl: NIMTABLE_DATABASE_URL
    jwtSecret: NIMTABLE_JWT_SECRET
    adminUsername: NIMTABLE_ADMIN_USERNAME
    adminPassword: NIMTABLE_ADMIN_PASSWORD
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
