namespace: proj10-platform

# Phase 1 scaffold values. Runtime services are added in later phases.
pipeline:
  phase: "phase-5-admin-ux-tools"

redpanda:
  enabled: true
  name: redpanda
  image:
    repository: docker.redpanda.com/redpandadata/redpanda
    tag: v25.3.7
  service:
    kafkaPort: 9092
    schemaRegistryPort: 8081
    pandaProxyPort: 8082
    adminPort: 9644
    rpcPort: 33145
  storage:
    size: 20Gi
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1"
      memory: "2Gi"
  logRetentionMs: "2592000000"
  logSegmentMs: "3600000"

redis:
  enabled: true
  name: redis
  image:
    repository: redis
    tag: "7-alpine"
  service:
    port: 6379
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

streamConsumer:
  enabled: true
  name: stream-consumer
  replicaCount: 1
  image:
    repository: busybox
    tag: "1.36"
  env:
    KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
    KAFKA_CONSUMER_GROUP: "proj10-stream-consumer"
    KAFKA_TOPICS: "gourmetgram.views,gourmetgram.comments,gourmetgram.uploads,gourmetgram.flags"
    REDIS_HOST: "redis"
    REDIS_PORT: "6379"
    REDIS_DB: "0"
    MODERATION_TOPIC: "gourmetgram.moderation_requests"
    LOG_LEVEL: "INFO"
  command:
    - sh
    - -c
  args:
    - |
      echo "[stream-consumer] placeholder started";
      while true; do
        nc -z redpanda 9092 && nc -z redis 6379 && echo "[stream-consumer] redpanda+redis reachable";
        sleep 20;
      done
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

modelServer:
  enabled: true
  name: model-server
  replicaCount: 1
  image:
    repository: hashicorp/http-echo
    tag: "1.0.0"
  service:
    port: 8000
  responseText: "dummy-risk-model:ok:v0"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

airflow:
  enabled: true
  name: airflow
  image:
    repository: apache/airflow
    tag: "2.9.3-python3.11"
  service:
    port: 8080
  storage:
    size: 20Gi
  existingSecret: airflow-secrets
  secretKeys:
    username: AIRFLOW_ADMIN_USERNAME
    password: AIRFLOW_ADMIN_PASSWORD
    firstname: AIRFLOW_ADMIN_FIRSTNAME
    lastname: AIRFLOW_ADMIN_LASTNAME
    email: AIRFLOW_ADMIN_EMAIL
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "3Gi"

adminer:
  enabled: true
  name: adminer
  image:
    repository: adminer
    tag: "latest"
  service:
    port: 5050
  externalIP: "0.0.0.0"
  defaultServer: postgres
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

redisInsight:
  enabled: true
  name: redisinsight
  image:
    repository: redis/redisinsight
    tag: "latest"
  service:
    port: 15540
  externalIP: "0.0.0.0"
  storage:
    size: 5Gi
  env:
    redisHost: redis
    redisPort: "6379"
    redisAlias: proj10-redis
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

nimtable:
  enabled: true
  name: nimtable
  image:
    repository: ghcr.io/nimtable/nimtable
    tag: "nightly"
  service:
    port: 18182
    targetPort: 8182
  externalIP: "0.0.0.0"
  javaOpts: "-Xmx2g -Xms256m"
  config:
    existingSecret: nimtable-config
    key: config.yaml
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

nimtableWeb:
  enabled: true
  name: nimtable-web
  image:
    repository: ghcr.io/nimtable/nimtable-web
    tag: "nightly"
  service:
    port: 13000
    targetPort: 3000
  externalIP: "0.0.0.0"
  existingSecret: nimtable-secrets
  secretKeys:
    databaseUrl: NIMTABLE_DATABASE_URL
    jwtSecret: NIMTABLE_JWT_SECRET
    adminUsername: NIMTABLE_ADMIN_USERNAME
    adminPassword: NIMTABLE_ADMIN_PASSWORD
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
