global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/prometheus-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ml-api (FastAPI) — prometheus-fastapi-instrumentator exposes /metrics on :8000
  - job_name: 'ml-api'
    static_configs:
      - targets: ['ml-api:8000']

  # stream-consumer — prometheus_client.start_http_server on :9100
  - job_name: 'stream-consumer'
    static_configs:
      - targets: ['stream-consumer-metrics:9100']

  # Pushgateway — receives batch-job metrics pushed by etl-job and batch-pipeline
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # Self-scrape for Prometheus health and capacity
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']
