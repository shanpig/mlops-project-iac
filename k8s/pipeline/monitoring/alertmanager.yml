global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ["alertname", "job", "severity"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 2h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "http://localhost:9999/alerts"
        send_resolved: true
