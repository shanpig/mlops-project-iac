{{- if .Values.nimtable.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nimtable.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.nimtable.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nimtable.name }}
    spec:
      containers:
        - name: nimtable
          image: {{ .Values.nimtable.image.repository }}:{{ .Values.nimtable.image.tag }}
          imagePullPolicy: IfNotPresent
          workingDir: /app
          env:
            - name: JAVA_OPTS
              value: {{ .Values.nimtable.javaOpts | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.nimtable.service.targetPort }}
          resources:
            {{- toYaml .Values.nimtable.resources | nindent 12 }}
          volumeMounts:
            - name: nimtable-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: nimtable-config
              mountPath: /nimtable/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: nimtable-config
          secret:
            secretName: {{ .Values.nimtable.config.existingSecret | quote }}
            items:
              - key: {{ .Values.nimtable.config.key | quote }}
                path: config.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nimtable.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.nimtable.name }}
  ports:
    - name: http
      port: {{ .Values.nimtable.service.port }}
      targetPort: http
  {{- if .Values.nimtable.externalIP }}
  externalIPs:
    - {{ .Values.nimtable.externalIP }}
  {{- end }}
{{- end }}
---
{{- if .Values.nimtableWeb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nimtableWeb.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.nimtableWeb.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.nimtableWeb.name }}
    spec:
      containers:
        - name: nimtable-web
          image: {{ .Values.nimtableWeb.image.repository }}:{{ .Values.nimtableWeb.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_API_URL
              value: "http://{{ .Values.nimtable.name }}:{{ .Values.nimtable.service.port }}"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nimtableWeb.existingSecret | quote }}
                  key: {{ .Values.nimtableWeb.secretKeys.databaseUrl | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nimtableWeb.existingSecret | quote }}
                  key: {{ .Values.nimtableWeb.secretKeys.jwtSecret | quote }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nimtableWeb.existingSecret | quote }}
                  key: {{ .Values.nimtableWeb.secretKeys.adminUsername | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.nimtableWeb.existingSecret | quote }}
                  key: {{ .Values.nimtableWeb.secretKeys.adminPassword | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.nimtableWeb.service.targetPort }}
          resources:
            {{- toYaml .Values.nimtableWeb.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nimtableWeb.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.nimtableWeb.name }}
  ports:
    - name: http
      port: {{ .Values.nimtableWeb.service.port }}
      targetPort: http
  {{- if .Values.nimtableWeb.externalIP }}
  externalIPs:
    - {{ .Values.nimtableWeb.externalIP }}
  {{- end }}
{{- end }}
