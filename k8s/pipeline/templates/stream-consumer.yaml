{{- if .Values.streamConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.streamConsumer.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.streamConsumer.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.streamConsumer.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.streamConsumer.name }}
    spec:
      {{- with .Values.streamConsumer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.streamConsumer.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: stream-consumer
          image: {{ .Values.streamConsumer.image.repository }}:{{ .Values.streamConsumer.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              export DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/${PGDATABASE}"
              exec python main.py
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.host | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.password | quote }}
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.dbname | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.minioSecret.name | quote }}
                  key: {{ .Values.streamConsumer.minioSecret.keys.accessKey | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.minioSecret.name | quote }}
                  key: {{ .Values.streamConsumer.minioSecret.keys.secretKey | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.streamConsumer.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.streamConsumer.env.KAFKA_CONSUMER_GROUP | quote }}
            - name: KAFKA_TOPICS
              value: {{ .Values.streamConsumer.env.KAFKA_TOPICS | quote }}
            - name: REDIS_HOST
              value: {{ .Values.streamConsumer.env.REDIS_HOST | quote }}
            - name: REDIS_PORT
              value: {{ .Values.streamConsumer.env.REDIS_PORT | quote }}
            - name: REDIS_DB
              value: {{ .Values.streamConsumer.env.REDIS_DB | quote }}
            - name: ENDPOINT_URL
              value: {{ .Values.streamConsumer.env.ENDPOINT_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.streamConsumer.env.LOG_LEVEL | quote }}
            - name: PROMETHEUS_METRICS_PORT
              value: {{ .Values.streamConsumer.env.PROMETHEUS_METRICS_PORT | quote }}
          {{- if .Values.streamConsumer.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.streamConsumer.metrics.port }}
          startupProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.streamConsumer.resources | nindent 12 }}
---
{{- if .Values.streamConsumer.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.streamConsumer.metrics.serviceName }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.streamConsumer.name }}
  ports:
    - name: metrics
      port: {{ .Values.streamConsumer.metrics.port }}
      targetPort: metrics
{{- end }}
{{- end }}
