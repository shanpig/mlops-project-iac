{{- if .Values.streamConsumer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.streamConsumer.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.streamConsumer.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.streamConsumer.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.streamConsumer.name }}
    spec:
      containers:
        - name: stream-consumer
          image: {{ .Values.streamConsumer.image.repository }}:{{ .Values.streamConsumer.image.tag }}
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              export DATABASE_URL="postgresql://${PGUSER}:${PGPASSWORD}@${PGHOST}:5432/${PGDATABASE}"
              exec python main.py
          env:
            - name: PGHOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.host | quote }}
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.username | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.password | quote }}
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.postgresSecret.name | quote }}
                  key: {{ .Values.streamConsumer.postgresSecret.keys.dbname | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.minioSecret.name | quote }}
                  key: {{ .Values.streamConsumer.minioSecret.keys.accessKey | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.streamConsumer.minioSecret.name | quote }}
                  key: {{ .Values.streamConsumer.minioSecret.keys.secretKey | quote }}
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.streamConsumer.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.streamConsumer.env.KAFKA_CONSUMER_GROUP | quote }}
            - name: KAFKA_TOPICS
              value: {{ .Values.streamConsumer.env.KAFKA_TOPICS | quote }}
            - name: REDIS_HOST
              value: {{ .Values.streamConsumer.env.REDIS_HOST | quote }}
            - name: REDIS_PORT
              value: {{ .Values.streamConsumer.env.REDIS_PORT | quote }}
            - name: REDIS_DB
              value: {{ .Values.streamConsumer.env.REDIS_DB | quote }}
            - name: ENDPOINT_URL
              value: {{ .Values.streamConsumer.env.ENDPOINT_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.streamConsumer.env.LOG_LEVEL | quote }}
          resources:
            {{- toYaml .Values.streamConsumer.resources | nindent 12 }}
{{- end }}
