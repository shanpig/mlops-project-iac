{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
{{ .Files.Get "monitoring/prometheus.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
{{ .Files.Get "monitoring/grafana/provisioning/datasources/prometheus.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.namespace }}
data:
  provider.yml: |
{{ .Files.Get "monitoring/grafana/provisioning/dashboards/provider.yml" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.namespace }}
data:
  batch_pipeline.json: |
{{ .Files.Get "monitoring/grafana/dashboards/batch_pipeline.json" | indent 4 }}
  etl.json: |
{{ .Files.Get "monitoring/grafana/dashboards/etl.json" | indent 4 }}
  live_data.json: |
{{ .Files.Get "monitoring/grafana/dashboards/live_data.json" | indent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.monitoring.prometheus.storage.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.monitoring.pushgateway.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.monitoring.pushgateway.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.monitoring.pushgateway.name }}
    spec:
      containers:
        - name: pushgateway
          image: {{ .Values.monitoring.pushgateway.image.repository }}:{{ .Values.monitoring.pushgateway.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.monitoring.pushgateway.service.port }}
              name: http
          resources:
            {{- toYaml .Values.monitoring.pushgateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.monitoring.pushgateway.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.monitoring.pushgateway.name }}
  ports:
    - name: http
      port: {{ .Values.monitoring.pushgateway.service.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.monitoring.prometheus.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.monitoring.prometheus.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.monitoring.prometheus.name }}
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image.repository }}:{{ .Values.monitoring.prometheus.image.tag }}
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.console.libraries=/usr/share/prometheus/console_libraries
            - --web.console.templates=/usr/share/prometheus/consoles
          ports:
            - containerPort: {{ .Values.monitoring.prometheus.service.port }}
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
          resources:
            {{- toYaml .Values.monitoring.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.monitoring.prometheus.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.monitoring.prometheus.name }}
  ports:
    - name: http
      port: {{ .Values.monitoring.prometheus.service.port }}
      targetPort: http
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.monitoring.grafana.storage.size | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.monitoring.grafana.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.monitoring.grafana.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.monitoring.grafana.name }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image.repository }}:{{ .Values.monitoring.grafana.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
          ports:
            - containerPort: {{ .Values.monitoring.grafana.service.port }}
              name: http
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            {{- toYaml .Values.monitoring.grafana.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.monitoring.grafana.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.monitoring.grafana.name }}
  ports:
    - name: http
      port: {{ .Values.monitoring.grafana.service.port }}
      targetPort: http
{{- end }}
