{{- if .Values.mlServing.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mlServing.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.mlServing.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.mlServing.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.mlServing.name }}
    spec:
      {{- with .Values.mlServing.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mlServing.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ml-serving
          image: {{ .Values.mlServing.image.repository }}:{{ .Values.mlServing.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MODEL_PATH
              value: {{ .Values.mlServing.env.MODEL_PATH | quote }}
            - name: REDIS_URL
              value: {{ .Values.mlServing.env.REDIS_URL | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.mlServing.env.LOG_LEVEL | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.mlServing.service.port }}
          resources:
            {{- toYaml .Values.mlServing.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mlServing.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.mlServing.name }}
  ports:
    - name: http
      port: {{ .Values.mlServing.service.port }}
      targetPort: http
{{- end }}
