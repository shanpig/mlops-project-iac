apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: proj10-route
  namespace: proj10-platform
spec:
  parentRefs:
  - name: proj10-gateway
  rules:
  - backendRefs:
    - name: proj10-app
      namespace: proj10-production
      port: 8080
      weight: 90
    - name: proj10-app
      namespace: proj10-canary
      port: 8081
      weight: 10
