---
- name: Deploy proj10 Pipeline via ArgoCD & Helm
  hosts: node1
  become: yes
  vars:
    app_name: proj10-pipeline
    repo_url: https://github.com/shanpig/mlops-project-iac.git
    app_path: k8s/pipeline
    target_namespace: proj10-platform
    argocd_namespace: argocd

  tasks:
    - name: Get ArgoCD admin password
      command: >
        kubectl get secret -n {{ argocd_namespace }} argocd-initial-admin-secret \
        -o jsonpath="{.data.password}"
      register: argocd_password_b64

    - name: Decode ArgoCD password
      shell: echo {{ argocd_password_b64.stdout }} | base64 --decode
      register: argocd_password

    - name: Login to ArgoCD
      command: >
        argocd login localhost --username admin \
        --password "{{ argocd_password.stdout }}" \
        --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}
      changed_when: false

    - name: Ensure target namespace exists
      command: kubectl create namespace {{ target_namespace }}
      register: ns_create
      failed_when: ns_create.rc != 0 and "AlreadyExists" not in ns_create.stderr
      changed_when: "'created' in ns_create.stdout"

    - name: Apply pipeline SealedSecrets from Git
      loop:
        - https://raw.githubusercontent.com/shanpig/mlops-project-iac/main/k8s/secrets/proj10-platform-airflow-secrets-sealedsecret.yaml
        - https://raw.githubusercontent.com/shanpig/mlops-project-iac/main/k8s/secrets/proj10-platform-nimtable-config-sealedsecret.yaml
        - https://raw.githubusercontent.com/shanpig/mlops-project-iac/main/k8s/secrets/proj10-platform-nimtable-secrets-sealedsecret.yaml
      command: kubectl apply -f {{ item }}

    - name: Read floating IP from Terraform output (controller-side)
      delegate_to: localhost
      become: false
      command: terraform -chdir=../tf/kvm output -raw floating_ip_out
      register: tf_floating_ip
      failed_when: false
      changed_when: false

    - name: Detect fallback external IP starting with 10.56
      set_fact:
        external_ip_fallback: "{{ ansible_all_ipv4_addresses | select('match', '^10\\.56\\..*') | list | first }}"

    - name: Select external IP for service exposure
      set_fact:
        external_ip: "{{ (tf_floating_ip.stdout | default('') | trim) if (tf_floating_ip.rc is defined and tf_floating_ip.rc == 0 and (tf_floating_ip.stdout | trim) != '') else external_ip_fallback }}"

    - name: Check if ArgoCD app exists
      command: argocd app get {{ app_name }} --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}
      register: app_check
      failed_when: false
      changed_when: false

    - name: Create ArgoCD Helm app if not exists
      when: app_check.rc != 0
      command: >
        argocd app create {{ app_name }} \
        --repo {{ repo_url }} \
        --path {{ app_path }} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace {{ target_namespace }} \
        --helm-set-string adminer.externalIP={{ external_ip }} \
        --helm-set-string redisInsight.externalIP={{ external_ip }} \
        --helm-set-string nimtable.externalIP={{ external_ip }} \
        --helm-set-string nimtableWeb.externalIP={{ external_ip }} \
        --helm-set-string monitoring.prometheus.externalIP={{ external_ip }} \
        --helm-set-string monitoring.grafana.externalIP={{ external_ip }} \
        --helm-set-string redpandaConsole.externalIP={{ external_ip }} \
        --helm-set-string redpanda.externalIP={{ external_ip }} \
        --helm-set-string mlApi.env.DATABASE_URL=postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE) \
        --sync-policy automated --self-heal \
        --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}

    - name: Update ArgoCD Helm app if exists
      when: app_check.rc == 0
      command: >
        argocd app set {{ app_name }} \
        --repo {{ repo_url }} \
        --path {{ app_path }} \
        --dest-server https://kubernetes.default.svc \
        --dest-namespace {{ target_namespace }} \
        --helm-set-string adminer.externalIP={{ external_ip }} \
        --helm-set-string redisInsight.externalIP={{ external_ip }} \
        --helm-set-string nimtable.externalIP={{ external_ip }} \
        --helm-set-string nimtableWeb.externalIP={{ external_ip }} \
        --helm-set-string monitoring.prometheus.externalIP={{ external_ip }} \
        --helm-set-string monitoring.grafana.externalIP={{ external_ip }} \
        --helm-set-string redpandaConsole.externalIP={{ external_ip }} \
        --helm-set-string redpanda.externalIP={{ external_ip }} \
        --helm-set-string mlApi.env.DATABASE_URL=postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):5432/$(PGDATABASE) \
        --sync-policy automated --self-heal \
        --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}

    - name: Best-effort terminate any stale in-progress operation
      command: >
        argocd app terminate-op {{ app_name }} \
        --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}
      register: terminate_op_before_sync
      failed_when: false
      changed_when: terminate_op_before_sync.rc == 0

    - name: Sync ArgoCD app with retry for transient lock/port-forward errors
      shell: |
        set -euo pipefail
        for attempt in 1 2 3 4 5 6; do
          if argocd app sync {{ app_name }} --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}; then
            exit 0
          fi
          rc=$?
          echo "argocd app sync failed (attempt=${attempt}, rc=${rc}); trying to clear lock and retry..." >&2
          argocd app terminate-op {{ app_name }} --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }} || true
          sleep $((attempt * 5))
        done
        exit 1
      args:
        executable: /bin/bash
      changed_when: false

    - name: Display ArgoCD app status
      command: argocd app get {{ app_name }} --grpc-web --port-forward --port-forward-namespace={{ argocd_namespace }}
      register: final_status
      changed_when: false

    - name: Show final status
      debug:
        var: final_status.stdout
