- name: Build GemSpot ML/Data Service Images Workflow
  hosts: node1
  become: yes
  vars:
    repo_url: https://github.com/shanpig/mlops-project-iac.git
    repo_dest: /tmp/proj10-iac
    workflow_file: workflows/build-ml-services-initial-buildkit.yaml
    argo_namespace: argo
    app_repo_owner: lefteriskomvopoulos
    app_repo_name: GemSpotApp
    data_repo_owner: lefteriskomvopoulos
    data_repo_name: gemspot
    github_auth_username: "{{ github_username | default('', true) }}"
    github_auth_token: "{{ github_token | default('', true) }}"
    app_repo_url: >-
      {{
        (github_auth_username | length > 0 and github_auth_token | length > 0)
        | ternary(
            'https://' ~ github_auth_username ~ ':' ~ github_auth_token ~ '@github.com/' ~ app_repo_owner ~ '/' ~ app_repo_name ~ '.git',
            'https://github.com/' ~ app_repo_owner ~ '/' ~ app_repo_name ~ '.git'
          )
      }}
    data_repo_url: >-
      {{
        (github_auth_username | length > 0 and github_auth_token | length > 0)
        | ternary(
            'https://' ~ github_auth_username ~ ':' ~ github_auth_token ~ '@github.com/' ~ data_repo_owner ~ '/' ~ data_repo_name ~ '.git',
            'https://github.com/' ~ data_repo_owner ~ '/' ~ data_repo_name ~ '.git'
          )
      }}

  tasks:
    - name: Clone or update proj10-iac repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main

    - name: Submit Argo Workflow for GemSpot service image build
      shell: |
        kubectl -n {{ argo_namespace }} create -f - <<EOF
        $(cat {{ repo_dest }}/{{ workflow_file }} \
          | sed 's#value: https://github.com/lefteriskomvopoulos/GemSpotApp.git#value: {{ app_repo_url }}#' \
          | sed 's#value: https://github.com/lefteriskomvopoulos/gemspot.git#value: {{ data_repo_url }}#')
        EOF
      register: workflow_submit
      no_log: true

    - name: Extract workflow name
      set_fact:
        workflow_name_generated: "{{ workflow_submit.stdout.split(' ')[0].split('/')[1] }}"

    - name: Wait for workflow to complete (success or fail)
      shell: |
        kubectl -n {{ argo_namespace }} wait --for=condition=Completed workflow/{{ workflow_name_generated }} --timeout=1800s
      register: workflow_status
      failed_when: workflow_status.rc != 0

    - name: Get final workflow result
      shell: |
        kubectl -n {{ argo_namespace }} get workflow {{ workflow_name_generated }} -o jsonpath="{.status.phase}"
      register: workflow_phase

    - name: Display workflow phase
      debug:
        msg: "Workflow {{ workflow_name_generated }} finished with status: {{ workflow_phase.stdout }}"

    - name: Fail if workflow did not succeed
      fail:
        msg: "Workflow {{ workflow_name_generated }} failed with status: {{ workflow_phase.stdout }}"
      when: workflow_phase.stdout != "Succeeded"
