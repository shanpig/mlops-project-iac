---
- name: Prepare local Kubernetes Secret manifests from templates and .env
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    env_setup_script: "{{ repo_root }}/bin/env_setup"
    secrets_template_dir: "{{ repo_root }}/k8s/secrets/templates"
    secrets_plain_dir: "{{ repo_root }}/k8s/secrets/plain"
    required_templates:
      - proj10-platform-minio-credentials-secret.yaml.template
      - proj10-platform-postgres-credentials-secret.yaml.template
      - proj10-platform-airflow-secrets-secret.yaml.template
      - proj10-platform-nimtable-config-secret.yaml.template
      - proj10-platform-nimtable-secrets-secret.yaml.template
      - proj10-staging-proj10-adventurelog-secrets-secret.yaml.template
      - proj10-canary-proj10-adventurelog-secrets-secret.yaml.template
      - proj10-production-proj10-adventurelog-secrets-secret.yaml.template

  tasks:
    - name: Check secret template files exist
      stat:
        path: "{{ secrets_template_dir }}/{{ item }}"
      register: template_stats
      loop: "{{ required_templates }}"

    - name: Fail if required secret template files are missing
      assert:
        that:
          - item.stat.exists
        fail_msg: "Missing secret template: {{ item.item }}"
      loop: "{{ template_stats.results }}"

    - name: Ensure plain secret output directory exists
      file:
        path: "{{ secrets_plain_dir }}"
        state: directory
        mode: "0755"

    - name: Render secret manifests via env_setup
      command: "bash {{ env_setup_script }}"
      args:
        chdir: "{{ repo_root }}"

    - name: Verify rendered plain secret files exist
      find:
        paths: "{{ secrets_plain_dir }}"
        patterns: "*.yaml"
      register: plain_secret_files

    - name: Fail if no rendered plain secret files were generated
      assert:
        that:
          - plain_secret_files.matched > 0
        fail_msg: "No rendered secret files found in {{ secrets_plain_dir }}."

    - name: Show rendered plain secret files
      debug:
        msg: "{{ plain_secret_files.files | map(attribute='path') | list }}"
