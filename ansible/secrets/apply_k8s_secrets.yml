---
- name: Apply SealedSecrets on cluster
  hosts: node1
  become: yes
  vars:
    use_local_repo: true
    local_repo_root: "{{ playbook_dir }}/../.."
    repo_url: "https://github.com/shanpig/mlops-project-iac.git"
    repo_dest: "/tmp/proj10-iac"
    sealed_secrets_dir: "k8s/secrets"
    required_namespaces:
      - proj10-platform
      - proj10-staging
      - proj10-canary
      - proj10-production
    required_runtime_secrets:
      - { namespace: "proj10-platform", name: "minio-credentials" }
      - { namespace: "proj10-platform", name: "postgres-credentials" }
      - { namespace: "proj10-platform", name: "airflow-secrets" }
      - { namespace: "proj10-platform", name: "nimtable-config" }
      - { namespace: "proj10-platform", name: "nimtable-secrets" }
      - { namespace: "proj10-staging", name: "proj10-adventurelog-secrets" }
      - { namespace: "proj10-canary", name: "proj10-adventurelog-secrets" }
      - { namespace: "proj10-production", name: "proj10-adventurelog-secrets" }

  tasks:
    - name: Ensure remote sealed-secrets directory exists
      file:
        path: "{{ repo_dest }}/{{ sealed_secrets_dir }}"
        state: directory
        mode: "0755"

    - name: Copy sealed secret manifests from local repo checkout
      when: use_local_repo | bool
      copy:
        src: "{{ local_repo_root }}/{{ sealed_secrets_dir }}/"
        dest: "{{ repo_dest }}/{{ sealed_secrets_dir }}/"
        mode: "0644"

    - name: Clone or update repo
      when: not (use_local_repo | bool)
      git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dest }}"
        version: main

    - name: Check Sealed Secrets CRD exists
      command: kubectl get crd sealedsecrets.bitnami.com
      register: sealed_crd_check
      failed_when: false
      changed_when: false

    - name: Fail with instructions if Sealed Secrets CRD is missing
      fail:
        msg: >
          Sealed Secrets controller/CRD not found.
          Install on remote node:
          helm repo add bitnami https://charts.bitnami.com/bitnami &&
          helm repo update &&
          helm upgrade --install sealed-secrets bitnami/sealed-secrets -n kube-system --create-namespace --set-string fullnameOverride=sealed-secrets-controller
      when: sealed_crd_check.rc != 0

    - name: Ensure required namespaces exist before applying SealedSecrets
      command: kubectl get namespace {{ item }}
      loop: "{{ required_namespaces }}"
      changed_when: false

    - name: Find sealed secret files in repository
      find:
        paths: "{{ repo_dest }}/{{ sealed_secrets_dir }}"
        patterns: "*-sealedsecret.yaml"
      register: sealed_files

    - name: Fail if no sealed secret files are present
      assert:
        that:
          - sealed_files.matched > 0
        fail_msg: "No *-sealedsecret.yaml files found in {{ repo_dest }}/{{ sealed_secrets_dir }}."

    - name: Apply all sealed secret manifests
      command: kubectl apply -f {{ repo_dest }}/{{ sealed_secrets_dir }}
      register: apply_output
      changed_when: "'created' in apply_output.stdout or 'configured' in apply_output.stdout"

    - name: Verify runtime secrets are created
      command: kubectl -n {{ item.namespace }} get secret {{ item.name }}
      loop: "{{ required_runtime_secrets }}"
      changed_when: false

    - name: Show apply output
      debug:
        var: apply_output.stdout_lines
