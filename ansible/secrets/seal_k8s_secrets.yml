---
- name: Seal locally rendered Kubernetes Secrets into SealedSecrets
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    secrets_plain_dir: "{{ repo_root }}/k8s/secrets/plain"
    secrets_output_dir: "{{ repo_root }}/k8s/secrets"
    controller_namespace: kube-system
    controller_name: sealed-secrets-controller
    controller_name_candidates:
      - sealed-secrets-controller
      - sealed-secrets
    cert_file: "{{ repo_root }}/k8s/secrets/sealed-secrets-cert.pem"
    cleanup_legacy_sealed_files: true

  tasks:
    - name: Ensure kubeseal is installed locally
      command: kubeseal --version
      changed_when: false

    - name: Ensure plain secrets directory exists
      stat:
        path: "{{ secrets_plain_dir }}"
      register: plain_dir_stat

    - name: Fail if plain secrets directory does not exist
      assert:
        that:
          - plain_dir_stat.stat.exists
          - plain_dir_stat.stat.isdir
        fail_msg: >
          Plain secret directory not found at {{ secrets_plain_dir }}.
          Run ansible/secrets/prepare_k8s_secrets.yml first.

    - name: Find plain secret manifests
      find:
        paths: "{{ secrets_plain_dir }}"
        patterns: "*.yaml"
      register: plain_secret_files

    - name: Fail if no plain secret manifests are present
      assert:
        that:
          - plain_secret_files.matched > 0
        fail_msg: >
          No plain secret manifests found in {{ secrets_plain_dir }}.
          Run ansible/secrets/prepare_k8s_secrets.yml first.

    - name: Detect Sealed Secrets controller service name
      shell: |
        set -e
        for name in {{ controller_name_candidates | join(' ') }}; do
          if kubectl -n {{ controller_namespace }} get svc "$name" >/dev/null 2>&1; then
            echo "$name"
            exit 0
          fi
        done
        exit 1
      args:
        executable: /bin/bash
      register: detected_controller_name
      changed_when: false
      failed_when: false

    - name: Set controller name from detection fallback
      set_fact:
        controller_name: "{{ detected_controller_name.stdout | trim }}"
      when: detected_controller_name.rc == 0 and (detected_controller_name.stdout | trim | length > 0)

    - name: Fail if Sealed Secrets controller service was not found
      assert:
        that:
          - controller_name | length > 0
          - detected_controller_name.rc == 0
        fail_msg: >
          Could not find Sealed Secrets service in namespace {{ controller_namespace }}.
          Tried: {{ controller_name_candidates | join(', ') }}.
          Verify controller install: kubectl -n {{ controller_namespace }} get deploy,svc | grep sealed-secrets

    - name: Fetch Sealed Secrets controller certificate
      shell: >
        kubeseal --controller-namespace {{ controller_namespace }}
        --controller-name {{ controller_name }}
        --fetch-cert > {{ cert_file }}
      args:
        executable: /bin/bash

    - name: Remove legacy *-secret-sealedsecret.yaml files
      when: cleanup_legacy_sealed_files
      find:
        paths: "{{ secrets_output_dir }}"
        patterns: "*-secret-sealedsecret.yaml"
      register: legacy_sealed_files

    - name: Delete legacy sealed files
      when: cleanup_legacy_sealed_files
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ legacy_sealed_files.files }}"

    - name: Seal each plain secret with canonical filename
      shell: |
        in="{{ item.path }}"
        base="$(basename "${in%.yaml}")"
        base="${base%-secret}"
        out="{{ secrets_output_dir }}/${base}-sealedsecret.yaml"
        kubeseal --format yaml --cert "{{ cert_file }}" < "${in}" > "${out}"
      args:
        executable: /bin/bash
      loop: "{{ plain_secret_files.files }}"

    - name: List generated sealed secret manifests
      find:
        paths: "{{ secrets_output_dir }}"
        patterns: "*-sealedsecret.yaml"
      register: sealed_secret_files

    - name: Show generated sealed secret files
      debug:
        msg: "{{ sealed_secret_files.files | map(attribute='path') | sort | list }}"
