---
- name: Build and push backup-tools image for cron-backup workflow
  hosts: node1
  become: yes
  vars:
    registry_host: registry.kube-system.svc.cluster.local:5000
    image_name: proj10-backup-tools
    image_tag: latest
    build_dir: /tmp/proj10-backup-tools-image

  tasks:
    - name: Ensure build directory exists
      file:
        path: "{{ build_dir }}"
        state: directory
        mode: "0755"

    - name: Write Dockerfile for backup-tools image
      copy:
        dest: "{{ build_dir }}/Dockerfile"
        mode: "0644"
        content: |
          FROM alpine:3.19
          RUN set -eux; \
            apk add --no-cache ca-certificates curl tar bash; \
            \
            # Download kubectl with retry/fallback mirrors for flaky outbound networks.
            kubectl_ok=0; \
            for url in \
              "https://dl.k8s.io/release/v1.30.4/bin/linux/amd64/kubectl" \
              "https://storage.googleapis.com/kubernetes-release/release/v1.30.4/bin/linux/amd64/kubectl" \
            ; do \
              if curl -fL --retry 8 --retry-all-errors --retry-delay 3 --connect-timeout 10 --max-time 600 -o /usr/local/bin/kubectl "$url"; then \
                kubectl_ok=1; \
                break; \
              fi; \
            done; \
            [ "$kubectl_ok" -eq 1 ]; \
            chmod +x /usr/local/bin/kubectl; \
            \
            # Download MinIO mc with retries.
            curl -fL --retry 8 --retry-all-errors --retry-delay 3 --connect-timeout 10 --max-time 600 \
              -o /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc; \
            chmod +x /usr/local/bin/mc

    - name: Build and push backup-tools image with retries
      shell: |
        set -euo pipefail
        IMAGE="{{ registry_host }}/{{ image_name }}:{{ image_tag }}"
        for attempt in 1 2 3; do
          echo "Build/push attempt ${attempt} for ${IMAGE}"
          if docker build -t "${IMAGE}" "{{ build_dir }}" && docker push "${IMAGE}"; then
            exit 0
          fi
          sleep $((attempt * 15))
        done
        echo "Failed to build/push ${IMAGE} after retries" >&2
        exit 1
      args:
        executable: /bin/bash
      register: build_push_result
      changed_when: true

    - name: Show pushed image reference
      debug:
        msg: "Pushed image {{ registry_host }}/{{ image_name }}:{{ image_tag }}"
