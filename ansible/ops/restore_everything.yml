---
- name: Restore PostgreSQL, MinIO, and selected cluster state from backup volume
  hosts: node1
  become: yes
  vars:
    backup_root: /mnt/mlops-backup
    backup_id: ""
    backup_dir: "{{ backup_root }}/{{ backup_id }}"

    restore_postgres: true
    restore_minio: true
    restore_argo_state: false
    restore_argocd_apps: false
    restore_github_auth: true
    restore_mlflow_postgres: true
    restore_nimtable_db: true

    db_namespaces:
      - proj10-staging
      - proj10-canary
      - proj10-production
    postgres_pod_label: app=proj10-postgres
    postgres_secret_name: proj10-adventurelog-secrets
    postgres_secret_key: POSTGRES_PASSWORD
    postgres_user: adventure
    postgres_db: database
    postgres_user_key: POSTGRES_USER

    minio_namespace: proj10-platform
    minio_secret_name: minio-credentials
    minio_access_key_field: accesskey
    minio_secret_key_field: secretkey
    minio_endpoint: http://minio.proj10-platform.svc.cluster.local:9000
    # Prefer internal image that already contains mc/tar to avoid flaky outbound downloads.
    minio_restore_image: registry.kube-system.svc.cluster.local:5000/proj10-backup-tools:latest
    minio_mc_download_url: https://dl.min.io/client/mc/release/linux-amd64/mc
    minio_restore_pod_running_timeout: 10m
    minio_buckets:
      - agent-datalake
      - mlflow-artifacts

    mlflow_postgres_namespace: proj10-platform
    mlflow_postgres_secret_name: postgres-credentials
    mlflow_postgres_host_field: host
    mlflow_postgres_user_field: username
    mlflow_postgres_password_field: password
    mlflow_postgres_db_field: dbname
    mlflow_postgres_port: "5432"

    nimtable_namespace: proj10-platform
    nimtable_secret_name: nimtable-secrets
    nimtable_db_url_field: NIMTABLE_DATABASE_URL
    nimtable_default_dbname: nimtable_catalog
    nimtable_db_namespace: proj10-production
    nimtable_postgres_pod_label: app=proj10-postgres
    nimtable_postgres_secret_name: proj10-adventurelog-secrets
    nimtable_postgres_password_key: POSTGRES_PASSWORD
    nimtable_postgres_user_key: POSTGRES_USER
    nimtable_postgres_default_user: adventure

    github_auth_secret_name: github-repo-auth
    github_auth_namespaces:
      - argo
      - argocd

  tasks:
    - name: Ensure backup_id is provided
      assert:
        that:
          - backup_id | trim | length > 0
        fail_msg: "Set backup_id, e.g. -e backup_id=20260420-154500"

    - name: Ensure backup directory exists
      stat:
        path: "{{ backup_dir }}"
      register: backup_dir_stat

    - name: Fail if backup directory not found
      assert:
        that:
          - backup_dir_stat.stat.exists
          - backup_dir_stat.stat.isdir
        fail_msg: "Backup directory not found: {{ backup_dir }}"

    - name: Restore MinIO bucket(s) from tarball
      when: restore_minio | bool
      shell: |
        set -euo pipefail
        BUCKET="{{ item }}"
        test -f "{{ backup_dir }}/minio/${BUCKET}.tgz"
        AK="$(kubectl -n {{ minio_namespace }} get secret {{ minio_secret_name }} -o jsonpath='{.data.{{ minio_access_key_field }}}' | base64 -d)"
        SK="$(kubectl -n {{ minio_namespace }} get secret {{ minio_secret_name }} -o jsonpath='{.data.{{ minio_secret_key_field }}}' | base64 -d)"
        cat "{{ backup_dir }}/minio/${BUCKET}.tgz" | \
          kubectl -n {{ minio_namespace }} run mc-restore --rm -i --restart=Never --pod-running-timeout={{ minio_restore_pod_running_timeout }} --image={{ minio_restore_image }} --env="AWS_ACCESS_KEY_ID=$AK" --env="AWS_SECRET_ACCESS_KEY=$SK" --command -- sh -lc \
          'set -euo pipefail;
           if ! command -v mc >/dev/null 2>&1; then
             if command -v apk >/dev/null 2>&1; then
               apk add --no-cache ca-certificates curl tar >/dev/null;
             fi;
             curl -fL --retry 8 --retry-all-errors --retry-delay 3 --connect-timeout 10 --max-time 600 -o /usr/local/bin/mc {{ minio_mc_download_url }};
             chmod +x /usr/local/bin/mc;
           fi;
           mc alias set m {{ minio_endpoint }} "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" >/dev/null;
           mc mb --ignore-existing m/'"${BUCKET}"' >/dev/null;
           rm -rf /tmp/'"${BUCKET}"';
           mkdir -p /tmp;
           tar -C /tmp -xzf -;
           mc mirror --overwrite --remove /tmp/'"${BUCKET}"' m/'"${BUCKET}"' >/dev/null'
      args:
        executable: /bin/bash
      loop: "{{ minio_buckets }}"
      changed_when: true

    - name: Restore PostgreSQL dumps for each environment
      when: restore_postgres | bool
      shell: |
        set -euo pipefail
        NS="{{ item }}"
        DUMP="{{ backup_dir }}/postgres/${NS}_database.dump"
        test -f "$DUMP"
        POD="$(kubectl -n "$NS" get pod -l {{ postgres_pod_label }} -o jsonpath='{.items[0].metadata.name}')"
        PW="$(kubectl -n "$NS" get secret {{ postgres_secret_name }} -o jsonpath='{.data.{{ postgres_secret_key }}}' | base64 -d)"
        REMOTE_DUMP="/tmp/${NS}_database.dump"
        kubectl -n "$NS" cp "$DUMP" "$POD:$REMOTE_DUMP"
        kubectl -n "$NS" exec "$POD" -- sh -lc \
          "PGPASSWORD='$PW' pg_restore -U '{{ postgres_user }}' -d '{{ postgres_db }}' --clean --if-exists --no-owner --no-privileges \"$REMOTE_DUMP\" && rm -f \"$REMOTE_DUMP\""
      args:
        executable: /bin/bash
      loop: "{{ db_namespaces }}"
      changed_when: true

    - name: Reset Nimtable application database to clean schema
      when: restore_nimtable_db | bool
      shell: |
        set -euo pipefail

        DB_NAME="{{ nimtable_default_dbname }}"
        if kubectl -n {{ nimtable_namespace }} get secret {{ nimtable_secret_name }} >/dev/null 2>&1; then
          DB_URL="$(kubectl -n {{ nimtable_namespace }} get secret {{ nimtable_secret_name }} -o jsonpath='{.data.{{ nimtable_db_url_field }}}' | base64 -d || true)"
          if [ -n "${DB_URL}" ]; then
            PARSED_DB="$(printf '%s' "${DB_URL}" | sed -E 's#^.*/([^/?]+)(\?.*)?$#\1#')"
            if [ -n "${PARSED_DB}" ]; then
              DB_NAME="${PARSED_DB}"
            fi
          fi
        fi

        NS="{{ nimtable_db_namespace }}"
        POD="$(kubectl -n "$NS" get pod -l {{ nimtable_postgres_pod_label }} -o jsonpath='{.items[0].metadata.name}')"
        PW="$(kubectl -n "$NS" get secret {{ nimtable_postgres_secret_name }} -o jsonpath='{.data.{{ nimtable_postgres_password_key }}}' | base64 -d)"
        PGUSER="$(kubectl -n "$NS" get secret {{ nimtable_postgres_secret_name }} -o jsonpath='{.data.{{ nimtable_postgres_user_key }}}' | base64 -d 2>/dev/null || true)"
        if [ -z "${PGUSER}" ]; then
          PGUSER="{{ nimtable_postgres_default_user }}"
        fi

        kubectl -n "$NS" exec "$POD" -- sh -lc \
          "PGPASSWORD='$PW' psql -U '$PGUSER' -d postgres -v ON_ERROR_STOP=1 -c \"SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='${DB_NAME}' AND pid <> pg_backend_pid();\""
        kubectl -n "$NS" exec "$POD" -- sh -lc \
          "PGPASSWORD='$PW' psql -U '$PGUSER' -d postgres -v ON_ERROR_STOP=1 -c \"DROP DATABASE IF EXISTS \\\"${DB_NAME}\\\";\""
        kubectl -n "$NS" exec "$POD" -- sh -lc \
          "PGPASSWORD='$PW' psql -U '$PGUSER' -d postgres -v ON_ERROR_STOP=1 -c \"CREATE DATABASE \\\"${DB_NAME}\\\";\""
      args:
        executable: /bin/bash
      changed_when: true

    - name: Restart Nimtable deployments after DB reset (best effort)
      when: restore_nimtable_db | bool
      shell: |
        set -euo pipefail
        if kubectl -n {{ nimtable_namespace }} get deploy nimtable >/dev/null 2>&1; then
          kubectl -n {{ nimtable_namespace }} rollout restart deploy/nimtable
          kubectl -n {{ nimtable_namespace }} rollout status deploy/nimtable --timeout=300s
        fi
        if kubectl -n {{ nimtable_namespace }} get deploy nimtable-web >/dev/null 2>&1; then
          kubectl -n {{ nimtable_namespace }} rollout restart deploy/nimtable-web
          kubectl -n {{ nimtable_namespace }} rollout status deploy/nimtable-web --timeout=300s
        fi
      args:
        executable: /bin/bash
      changed_when: true

    - name: Reapply Argo workflow state from backup
      when: restore_argo_state | bool
      shell: |
        set -euo pipefail
        kubectl apply -f "{{ backup_dir }}/argo/workflowtemplates.yaml"
        kubectl apply -f "{{ backup_dir }}/argo/cronworkflows.yaml"
      args:
        executable: /bin/bash
      changed_when: true

    - name: Reapply ArgoCD Applications from backup
      when: restore_argocd_apps | bool
      command: kubectl apply -f {{ backup_dir }}/argocd/applications.yaml
      changed_when: true

    - name: Restore GitHub auth secret manifests
      when: restore_github_auth | bool
      shell: |
        set -euo pipefail
        NS="{{ item }}"
        FILE="{{ backup_dir }}/${NS}/{{ github_auth_secret_name }}.yaml"
        if test -f "$FILE"; then
          # Avoid "object has been modified" conflicts from apply/patch by recreating atomically.
          kubectl -n "$NS" delete secret "{{ github_auth_secret_name }}" --ignore-not-found
          kubectl -n "$NS" create -f "$FILE"
          echo "Restored $FILE"
        else
          echo "No backup manifest found for $NS/{{ github_auth_secret_name }}, skipping"
        fi
      args:
        executable: /bin/bash
      loop: "{{ github_auth_namespaces }}"
      changed_when: true

    - name: Restore MLflow backend PostgreSQL dump
      when: restore_mlflow_postgres | bool
      shell: |
        set -euo pipefail
        DUMP="{{ backup_dir }}/postgres/mlflow_backend.dump"
        test -f "$DUMP"

        NS="{{ mlflow_postgres_namespace }}"
        PGHOST="$(kubectl -n "$NS" get secret {{ mlflow_postgres_secret_name }} -o jsonpath='{.data.{{ mlflow_postgres_host_field }}}' | base64 -d)"
        PGUSER="$(kubectl -n "$NS" get secret {{ mlflow_postgres_secret_name }} -o jsonpath='{.data.{{ mlflow_postgres_user_field }}}' | base64 -d)"
        PGPASSWORD="$(kubectl -n "$NS" get secret {{ mlflow_postgres_secret_name }} -o jsonpath='{.data.{{ mlflow_postgres_password_field }}}' | base64 -d)"
        PGDATABASE="$(kubectl -n "$NS" get secret {{ mlflow_postgres_secret_name }} -o jsonpath='{.data.{{ mlflow_postgres_db_field }}}' | base64 -d)"

        cat "$DUMP" | kubectl -n "$NS" run mlflow-pgrestore --rm -i --restart=Never --image=postgres:15 --env="PGHOST=$PGHOST" --env="PGPORT={{ mlflow_postgres_port }}" --env="PGUSER=$PGUSER" --env="PGPASSWORD=$PGPASSWORD" --env="PGDATABASE=$PGDATABASE" --command -- sh -lc \
          'set -euo pipefail; pg_restore --clean --if-exists --no-owner --no-privileges -d "$PGDATABASE"'
      args:
        executable: /bin/bash
      changed_when: true

    - name: Verify restored row counts
      when: restore_postgres | bool
      shell: |
        set -euo pipefail
        NS="{{ item }}"
        POD="$(kubectl -n "$NS" get pod -l {{ postgres_pod_label }} -o jsonpath='{.items[0].metadata.name}')"
        PW="$(kubectl -n "$NS" get secret {{ postgres_secret_name }} -o jsonpath='{.data.{{ postgres_secret_key }}}' | base64 -d)"
        kubectl -n "$NS" exec "$POD" -- sh -lc \
          "PGPASSWORD='$PW' psql -U '{{ postgres_user }}' -d '{{ postgres_db }}' -At -c \"\
          select 'users',count(*) from users union all \
          select 'locations',count(*) from locations union all \
          select 'clicks',count(*) from clicks union all \
          select 'comments',count(*) from comments union all \
          select 'rates',count(*) from rates union all \
          select 'vibe_dictionary',count(*) from vibe_dictionary union all \
          select 'category_dictionary',count(*) from category_dictionary;\""
      args:
        executable: /bin/bash
      loop: "{{ db_namespaces }}"
      register: restored_counts
      changed_when: false

    - name: Show restored row counts
      when: restore_postgres | bool
      debug:
        msg: |
          {{ item.item }}:
          {{ item.stdout }}
      loop: "{{ restored_counts.results }}"
